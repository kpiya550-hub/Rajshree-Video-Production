{% extends "base.html" %}

{% block content %}

<section class="contact">

    <div class="container">

        <h1>Contact Us</h1>

        <p class="subtitle">
            Let's create something amazing together.
        </p>

        <div class="contact-wrapper">

            <div class="contact-info">

                <h2>Get In Touch</h2>

                <p><strong>📍 Address:</strong><br> Patna, Bihar, India</p>

                <p><strong>📞 Phone:</strong><br> +91 9876543210</p>

                <p><strong>📧 Email:</strong><br> info@rajshreevideo.com</p>

                <p><strong>⏰ Timing:</strong><br> Mon - Sat (9AM - 8PM)</p>

            </div>

            <div class="contact-form">

                <form>

                    <input type="text" placeholder="Your Name">

                    <input type="email" placeholder="Your Email">

                    <input type="text" placeholder="Phone Number">

                    <textarea rows="6"
                    placeholder="Your Message"></textarea>

                    <button type="submit">
                        Send Message
                    </button>

                </form>

            </div>

        </div>

    </div>

</section>

{% endblock %}
