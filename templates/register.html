{% extends "base.html" %}

{% block content %}

<section class="register">

<div class="register-box">

<h1>Create Account</h1>

<form method="POST">

<input type="text"
name="full_name"
placeholder="Full Name"
required>

<input type="text"
name="username"
placeholder="Username"
required>

<input type="email"
name="email"
placeholder="Email"
required>

<input type="text"
name="mobile"
placeholder="Mobile Number"
required>

<input type="password"
name="password"
placeholder="Password"
required>

<button type="submit">

Register

</button>

</form>

</div>

</section>

{% endblock %}
