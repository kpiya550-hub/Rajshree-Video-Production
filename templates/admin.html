{% extends "base.html" %}

{% block content %}

<section class="admin">

<div class="container">

<h1>Contact Messages</h1>
<div class="table-responsive">
<table>

<thead>

<tr>

<th>ID</th>

<th>Name</th>

<th>Email</th>

<th>Phone</th>

<th>Message</th>
<th>Action</th>

</tr>

</thead>

<tbody>

{% for contact in contacts %}

<tr>

<td>{{ contact.id }}</td>

<td>{{ contact.name }}</td>

<td>{{ contact.email }}</td>

<td>{{ contact.phone }}</td>

<td>{{ contact.message }}</td>
<td>
    <a href="/delete/{{ contact.id }}"
       class="delete-btn"
       onclick="return confirm('Delete this message?')">
       Delete
    </a>
</td>

</tr>

{% endfor %}

</tbody>

</table>
</div>

</div>

</section>

{% endblock %}
